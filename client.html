<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>WebSocket Broadcast Receiver</title>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
</head>

<body>
    <h2>Live API Broadcast Monitor</h2>
    <div id="status" style="color: gray;">Connecting...</div>
    <ul id="messages"></ul>

    <script>
        // 1. Establish connection to your Nginx proxy (or directly to http://your-ip:8080 during local testing)
        const socket = io('ws://yourdomain', {
            path: '/socket.io',
            transports: ['websocket'],
            upgrade: false
        });

        // The room configuration we want to listen to
        const targetRoom = {
            room_type: 'public',
            room_id: 'lobby-12'
        };

        // 2. Handle successful connection handshake
        socket.on('connect', () => {
            console.log('Connected?');
            document.getElementById('status').innerText = `Connected! Joining room: ${targetRoom.room_id}...`;
            document.getElementById('status').style.color = "green";

            // Tell the server we want to enter this public room to receive its streams
            socket.emit('join_room', targetRoom);
        });

        // 3. Optional: Listen to server acknowledgments
        socket.on('status', (msg) => {
            console.log('Server status report:', msg);
        });

        // 4. CRITICAL: Listen for incoming broadcasts from the API
        socket.on('message_received', (data) => {
            console.log('Broadcast received:', data);

            const li = document.createElement('li');
            li.innerHTML = `<strong>[${data.room}] (${data.sender}):</strong> ${data.message} <em><small>${new Date(data.timestamp * 1000).toLocaleTimeString()}</small></em>`;
            document.getElementById('messages').appendChild(li);
        });

        // Handle errors or rejections cleanly
        socket.on('error_msg', (err) => {
            console.error('Socket Server Error:', err);
        });

        socket.on('disconnect', () => {
            document.getElementById('status').innerText = "Disconnected from server.";
            document.getElementById('status').style.color = "red";
        });
    </script>
</body>

</html>
